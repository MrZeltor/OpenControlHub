<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenControlHub</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <header>
        <h1>OpenControlHub</h1>
        <div id="status" class="status-disconnected">Disconnected</div>
    </header>

    <main id="dashboard">
        <!-- VS Code Module -->
        <section class="module-section">
            <h2>VS Code</h2>
            
            <div class="card">
                <h3>Recent Projects</h3>
                <div class="grid-buttons">
                    <button onclick="vscode.openProject('D:/Github-Star-Farming/PromptSqueeze')">PromptSqueeze</button>
                    <button onclick="vscode.openProject('D:/Github-Star-Farming/OpenControlHub')">OpenControlHub</button>
                </div>
            </div>

            <div class="card">
                <h3>Terminal Macros</h3>
                <div class="grid-buttons">
                    <button class="btn-macro" onclick="vscode.runMacro('git_status')">Git Status</button>
                    <button class="btn-macro" onclick="vscode.runMacro('git_push')">Git Push</button>
                    <button class="btn-macro" onclick="vscode.runMacro('npm_start')">NPM Start</button>
                </div>
            </div>

            <div class="card">
                <h3>Prompt Input</h3>
                <div class="prompt-container">
                    <textarea id="promptInput" placeholder="Type prompt here..."></textarea>
                    <button class="btn-primary" onclick="vscode.sendPrompt()">Send to PC</button>
                </div>
            </div>
        </section>
    </main>

    <script src="src/js/modules/vscode.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
